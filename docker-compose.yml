services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres

  worker:
    build: .
    command: celery -A src.api.tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sibyl
      POSTGRES_PASSWORD: sibyl
      POSTGRES_DB: sibyl
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
